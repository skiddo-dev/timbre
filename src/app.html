<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="dark" />
		<!-- Self-hosted fonts (no external CDN) — preload the faces above the fold:
		     the Bricolage wordmark/headings and the Inter UI body. -->
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/bricolage-600.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/inter-400.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/inter-500.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<title>Timbre</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
